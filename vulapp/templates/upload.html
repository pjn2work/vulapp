<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload - VulApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .drop-zone {
            border: 3px dashed #ccc;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .drop-zone.dragover {
            border-color: #667eea;
            background: #e8eaf6;
            transform: scale(1.02);
        }

        .drop-zone.uploading {
            border-color: #ffa726;
            background: #fff3e0;
        }

        .drop-zone.success {
            border-color: #66bb6a;
            background: #e8f5e9;
        }

        .drop-zone.error {
            border-color: #ef5350;
            background: #ffebee;
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .drop-zone.uploading .upload-icon {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .drop-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .drop-subtext {
            font-size: 14px;
            color: #666;
        }

        .file-input {
            display: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #66bb6a;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        .file-info {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }

        .file-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .file-info-item:last-child {
            margin-bottom: 0;
        }

        .file-info-label {
            font-weight: 600;
            color: #333;
        }

        .file-info-value {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 File Upload</h1>
        <p class="subtitle">Upload files up to 100MB - Max 50 files per user</p>

        <div class="nav-links">
            <a href="/web/files">📁 Browse Files</a>
            <a href="/">🏠 Home</a>
        </div>

        <div id="quotaInfo" style="margin-bottom: 15px; padding: 10px; background: #e3f2fd; border-radius: 8px; font-size: 14px; color: #1565c0; display: none;">
            <strong>📊 Upload Quota:</strong> <span id="quotaText">Loading...</span>
        </div>

        <div class="drop-zone" id="dropZone">
            <div class="upload-icon">☁️</div>
            <div class="drop-text">Drag & Drop your file here</div>
            <div class="drop-subtext">or click to browse</div>
        </div>

        <input type="file" id="fileInput" class="file-input">

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="file-info" id="fileInfo"></div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const message = document.getElementById('message');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const fileInfo = document.getElementById('fileInfo');
        const quotaInfo = document.getElementById('quotaInfo');
        const quotaText = document.getElementById('quotaText');

        // Click to browse
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and drop events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function showFileInfo(file) {
            fileInfo.innerHTML = `
                <div class="file-info-item">
                    <span class="file-info-label">File Name:</span>
                    <span class="file-info-value">${file.name}</span>
                </div>
                <div class="file-info-item">
                    <span class="file-info-label">File Size:</span>
                    <span class="file-info-value">${formatBytes(file.size)}</span>
                </div>
                <div class="file-info-item">
                    <span class="file-info-label">File Type:</span>
                    <span class="file-info-value">${file.type || 'Unknown'}</span>
                </div>
            `;
            fileInfo.style.display = 'block';
        }

        function handleFile(file) {
            // Reset states
            message.style.display = 'none';
            dropZone.classList.remove('success', 'error');

            // Check file size
            const maxSize = 100 * 1024 * 1024; // 100MB
            if (file.size > maxSize) {
                showMessage(`File size (${formatBytes(file.size)}) exceeds 100MB limit`, 'error');
                dropZone.classList.add('error');
                fileInfo.style.display = 'none';
                return;
            }

            showFileInfo(file);
            uploadFile(file);
        }

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            // Show progress
            dropZone.classList.add('uploading');
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';

            fetch('/web/upload-file', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                dropZone.classList.remove('uploading');
                progressFill.style.width = '100%';

                setTimeout(() => {
                    if (data.success) {
                        dropZone.classList.add('success');
                        showMessage(`✅ ${data.message}`, 'success');

                        // Update quota info
                        if (data.uploads_used !== undefined) {
                            const percentage = (data.uploads_used / 50 * 100).toFixed(0);
                            quotaText.textContent = `${data.uploads_used}/50 files used (${percentage}%) - ${data.uploads_remaining} remaining`;
                            quotaInfo.style.display = 'block';

                            // Change color based on usage
                            if (data.uploads_remaining <= 5) {
                                quotaInfo.style.background = '#ffebee';
                                quotaInfo.style.color = '#c62828';
                            } else if (data.uploads_remaining <= 15) {
                                quotaInfo.style.background = '#fff3e0';
                                quotaInfo.style.color = '#e65100';
                            }
                        }
                    } else {
                        dropZone.classList.add('error');
                        showMessage(`❌ ${data.error || 'Upload failed'}`, 'error');
                    }

                    // Reset after 3 seconds
                    setTimeout(() => {
                        dropZone.classList.remove('success', 'error');
                        progressContainer.style.display = 'none';
                        progressFill.style.width = '0%';
                        fileInfo.style.display = 'none';
                        fileInput.value = '';
                    }, 3000);
                }, 500);
            })
            .catch(error => {
                dropZone.classList.remove('uploading');
                dropZone.classList.add('error');
                progressContainer.style.display = 'none';
                showMessage(`❌ Upload failed: ${error.message}`, 'error');

                setTimeout(() => {
                    dropZone.classList.remove('error');
                    fileInfo.style.display = 'none';
                }, 3000);
            });

            // Simulate progress animation
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                if (progress <= 90) {
                    progressFill.style.width = progress + '%';
                } else {
                    clearInterval(interval);
                }
            }, 100);
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }
    </script>
</body>
</html>
