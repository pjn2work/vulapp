<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consent - VulApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #9ca3af;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            margin-top: 0.5rem;
        }

        .consent-box {
            background: rgba(167, 139, 250, 0.05);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            color: #d1d5db;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .consent-box p + p {
            margin-top: 0.75rem;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 1.125rem;
            height: 1.125rem;
            margin-top: 0.125rem;
            accent-color: #a78bfa;
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-group label {
            font-size: 0.875rem;
            color: #d1d5db;
            cursor: pointer;
            line-height: 1.5;
        }

        .button-row {
            display: flex;
            gap: 0.75rem;
        }

        button {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            color: #ffffff;
        }

        button[type="submit"]:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
        }

        button[type="submit"]:active:not(:disabled) {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            background: #374151;
            color: #6b7280;
            cursor: not-allowed;
        }

        button.cancel-btn {
            background: transparent;
            color: #9ca3af;
            border: 1px solid #374151;
        }

        button.cancel-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .divider {
            height: 1px;
            background: #2d2d2d;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Consent Required</h1>
                <p class="subtitle">Review and accept before proceeding</p>
                <span class="badge">Authorization</span>
            </div>

            <div class="consent-box">
                <p>You are about to access a restricted area of this application.</p>
                <p>By proceeding, you acknowledge that your session activity may be logged and monitored for security purposes.</p>
                <p>You must explicitly consent to continue.</p>
            </div>

            <form method="POST">
                <div class="checkbox-group">
                    <input type="checkbox" id="consent" name="consent" value="yes" onchange="toggleSubmit(this)">
                    <label for="consent">I understand and consent to the terms above</label>
                </div>

                <div class="button-row">
                    <button type="submit" name="action" value="cancel" class="cancel-btn" onclick="this.form.consent.disabled=true">Cancel</button>
                    <button type="submit" name="action" value="submit" id="submit-btn" disabled>Continue</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleSubmit(checkbox) {
            document.getElementById('submit-btn').disabled = !checkbox.checked;
        }
    </script>
</body>
</html>
