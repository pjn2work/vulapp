<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook - VulApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #9ca3af;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #d1d5db;
            margin-bottom: 0.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0a0a0a;
            border: 1px solid #374151;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        input::placeholder {
            color: #6b7280;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        button[type="submit"],
        .btn {
            flex: 1;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        button[type="submit"]:hover,
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
        }

        .btn-secondary {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
        }

        .btn-secondary:hover {
            border-color: #a78bfa;
            background: #2d2d2d;
        }

        .hint {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .hint-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #93c5fd;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hint-code {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            color: #10b981;
            border: 1px solid #374151;
            font-size: 0.75rem;
            display: block;
            margin-top: 0.25rem;
            overflow-x: auto;
        }

        .divider {
            height: 1px;
            background: #2d2d2d;
            margin: 2rem 0;
        }

        .welcome-section {
            background: rgba(167, 139, 250, 0.05);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
        }

        .welcome-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .welcome-message {
            font-size: 1rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Guestbook</h1>
                <p class="subtitle">Leave your mark on our guestbook</p>
                <span class="badge">Reflected XSS Vulnerable</span>
            </div>

            <form method="GET">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" autofocus>
                </div>

                <div class="btn-group">
                    <button type="submit">Sign Guestbook</button>
                    <a href="/" class="btn btn-secondary">← Home</a>
                </div>
            </form>

            <div class="hint">
                <div class="hint-title">
                    <span>💡</span>
                    <span>Exploitation Hint</span>
                </div>
                <p style="color: #9ca3af; font-size: 0.875rem; margin-bottom: 0.5rem;">Try XSS payload:</p>
                <code class="hint-code">&lt;script&gt;alert('XSS')&lt;/script&gt;</code>
                <code class="hint-code">&lt;img src=x onerror=alert(1)&gt;</code>
            </div>

            {% if name %}
            <div class="divider"></div>

            <div class="welcome-section">
                <div class="welcome-icon">👋</div>
                <div class="welcome-title">Welcome, {{ name|safe }}!</div>
                <p class="welcome-message">We are glad you're here.</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
