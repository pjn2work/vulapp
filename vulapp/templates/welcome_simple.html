<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - VulApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .user-info {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 6px;
            padding: 1.25rem;
            margin: 1.5rem 0;
        }

        .user-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #6ee7b7;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981;
        }

        .vulnerability-notice {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            padding: 1rem;
            margin: 1.5rem 0;
        }

        .vulnerability-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #fca5a5;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .vulnerability-text {
            font-size: 0.875rem;
            color: #f87171;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9375rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
        }

        .btn-secondary {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            color: #d1d5db;
        }

        .btn-secondary:hover {
            border-color: #a78bfa;
            background: #2d2d2d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="success-icon">✓</div>
            <h1>You are welcome!</h1>

            <div class="user-info">
                <div class="user-label">Logged in as</div>
                <div class="user-name">{{ username|safe }}</div>
            </div>

            <div class="vulnerability-notice">
                <span class="vulnerability-label">Security Notice</span>
                <p class="vulnerability-text">This page is vulnerable to reflected XSS via session data</p>
            </div>

            <div class="actions">
                <a href="/" class="btn btn-secondary">← Home</a>
                <a href="/web/logout" class="btn btn-primary">Logout</a>
            </div>
        </div>
    </div>
</body>
</html>
