info:
  name: POST /api/v1/oauth2/token (client_credentials)
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/oauth2/token"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "grant_type": "client_credentials",
        "client_id": "vulapp-client-001",
        "client_secret": "super-secret-client-secret",
        "scope": "read profile"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("oauthToken", res.body.access_token);

settings:
  encodeUrl: true
