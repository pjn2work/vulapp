<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Browser - VulApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a0a2a 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 40px;
        }

        .upload-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .upload-title {
            color: #ffffff;
            margin-bottom: 15px;
            text-align: center;
            font-size: 20px;
        }

        .drop-zone {
            border: 3px dashed #374151;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #0a0a0a;
        }

        .drop-zone.dragover {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.1);
            transform: scale(1.02);
        }

        .drop-zone.uploading {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        .drop-zone.success {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .drop-zone.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #a78bfa;
        }

        .drop-zone.uploading .upload-icon {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .drop-text {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .drop-subtext {
            font-size: 13px;
            color: #9ca3af;
        }

        .file-input {
            display: none;
        }

        .upload-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .upload-message.success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .upload-message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .progress-container {
            margin-top: 15px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #374151;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            width: 0%;
            transition: width 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            padding: 10px 20px;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
        }

        .search-bar {
            margin-bottom: 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #374151;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            background: #0a0a0a;
            color: #ffffff;
        }

        .search-input:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .search-input::placeholder {
            color: #6b7280;
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #a78bfa;
        }

        .files-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .files-table thead {
            background: #0a0a0a;
        }

        .files-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #d1d5db;
            border-bottom: 2px solid #2d2d2d;
        }

        .files-table td {
            padding: 15px;
            border-bottom: 1px solid #2d2d2d;
        }

        .files-table tbody tr {
            transition: background 0.2s ease;
        }

        .files-table tbody tr:hover {
            background: rgba(167, 139, 250, 0.05);
        }

        .file-icon {
            font-size: 24px;
            margin-right: 10px;
        }

        .file-name {
            display: flex;
            align-items: center;
            color: #ffffff;
            font-weight: 500;
        }

        .file-size {
            color: #9ca3af;
        }

        .file-date {
            color: #6b7280;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .download-btn, .delete-btn {
            padding: 8px 16px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .download-btn {
            background: linear-gradient(135deg, #a78bfa, #ec4899);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.3);
        }

        .delete-btn {
            background: #ef4444;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .delete-btn:disabled {
            background: #374151;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #374151;
            border-top: 4px solid #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 18px;
            margin-bottom: 10px;
            color: #9ca3af;
        }

        .empty-subtext {
            font-size: 14px;
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .files-table {
                font-size: 14px;
            }

            .files-table th,
            .files-table td {
                padding: 10px;
            }

            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="upload-section">
            <h1>📤 File Upload</h1>
            <div class="drop-zone" id="dropZone">
                <div class="upload-icon">☁️</div>
                <div class="drop-text">Drag & Drop your file here</div>
                <div class="drop-subtext">or click to browse (Max 100MB)</div>
            </div>
            <input type="file" id="fileInput" class="file-input">
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="upload-message" id="uploadMessage"></div>
        </div>

        <div class="header">
            <h1>📁 File Browser</h1>
            <div class="nav-links">
                <a href="/">🏠 Home</a>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search files...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Total Files</div>
                <div class="stat-value" id="totalFiles">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total Size</div>
                <div class="stat-value" id="totalSize">0 MB</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Upload Quota</div>
                <div class="stat-value" id="uploadQuota">0/50</div>
            </div>
        </div>

        <div id="loadingState" class="loading">
            <div class="loading-spinner"></div>
            <div>Loading files...</div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📂</div>
            <div class="empty-text">No files uploaded yet</div>
            <div class="empty-subtext">Upload your first file to get started</div>
        </div>

        <table class="files-table" id="filesTable" style="display: none;">
            <thead>
                <tr>
                    <th>File Name</th>
                    <th>Size</th>
                    <th>Modified</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="filesBody">
            </tbody>
        </table>
    </div>

    <script>
        let allFiles = [];

        // Upload functionality
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadMessage = document.getElementById('uploadMessage');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');

        // Click to browse
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and drop events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileUpload(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files[0]);
            }
        });

        function handleFileUpload(file) {
            // Reset states
            uploadMessage.style.display = 'none';
            dropZone.classList.remove('success', 'error');

            // Check file size
            const maxSize = 100 * 1024 * 1024; // 100MB
            if (file.size > maxSize) {
                showUploadMessage(`File size (${formatBytes(file.size)}) exceeds 100MB limit`, 'error');
                dropZone.classList.add('error');
                return;
            }

            uploadFile(file);
        }

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            // Show progress
            dropZone.classList.add('uploading');
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';

            fetch('/web/upload-file', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                dropZone.classList.remove('uploading');
                progressFill.style.width = '100%';

                setTimeout(() => {
                    if (data.success) {
                        dropZone.classList.add('success');
                        showUploadMessage(`✅ ${data.message}`, 'success');

                        // Reload files and quota
                        loadFiles();
                        loadQuota();
                    } else {
                        dropZone.classList.add('error');
                        showUploadMessage(`❌ ${data.error || 'Upload failed'}`, 'error');
                    }

                    // Reset after 3 seconds
                    setTimeout(() => {
                        dropZone.classList.remove('success', 'error');
                        progressContainer.style.display = 'none';
                        progressFill.style.width = '0%';
                        fileInput.value = '';
                    }, 1000);
                }, 500);
            })
            .catch(error => {
                dropZone.classList.remove('uploading');
                dropZone.classList.add('error');
                progressContainer.style.display = 'none';
                showUploadMessage(`❌ Upload failed: ${error.message}`, 'error');

                setTimeout(() => {
                    dropZone.classList.remove('error');
                }, 3000);
            });

            // Simulate progress animation
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                if (progress <= 95) {
                    progressFill.style.width = progress + '%';
                } else {
                    clearInterval(interval);
                }
            }, 50);
        }

        function showUploadMessage(text, type) {
            uploadMessage.textContent = text;
            uploadMessage.className = `upload-message ${type}`;
            uploadMessage.style.display = 'block';
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const iconMap = {
                'pdf': '📄',
                'doc': '📝',
                'docx': '📝',
                'xls': '📊',
                'xlsx': '📊',
                'csv': '📊',
                'ppt': '📊',
                'pptx': '📊',
                'zip': '📦',
                'rar': '📦',
                '7z': '📦',
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'png': '🖼️',
                'gif': '🖼️',
                'svg': '🖼️',
                'mp4': '🎥',
                'avi': '🎥',
                'mov': '🎥',
                'mp3': '🎵',
                'wav': '🎵',
                'txt': '📃',
                'json': '📋',
                'xml': '📋',
                'yaml': '📋',
                'html': '🌐',
                'css': '🎨',
                'js': '⚙️',
                'py': '🐍',
            };
            return iconMap[ext] || '📄';
        }

        function renderFiles(files) {
            const tbody = document.getElementById('filesBody');
            const filesTable = document.getElementById('filesTable');
            const emptyState = document.getElementById('emptyState');

            if (files.length === 0) {
                filesTable.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            filesTable.style.display = 'table';
            emptyState.style.display = 'none';

            tbody.innerHTML = files.map(file => `
                <tr data-filename="${file.name}">
                    <td>
                        <div class="file-name">
                            <span class="file-icon">${getFileIcon(file.name)}</span>
                            ${file.name}
                        </div>
                    </td>
                    <td class="file-size">${formatBytes(file.size)}</td>
                    <td class="file-date">${file.modified}</td>
                    <td>
                        <div class="action-buttons">
                            <a href="/web/download/${encodeURIComponent(file.name)}" class="download-btn" download>
                                ⬇️ Download
                            </a>
                            <button class="delete-btn" onclick="deleteFile('${file.name.replace(/'/g, "\\'")}')">
                                🗑️ Delete
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(files) {
            const totalFiles = files.length;
            const totalSize = files.reduce((sum, file) => sum + file.size, 0);

            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('totalSize').textContent = formatBytes(totalSize);
        }

        function loadQuota() {
            fetch('/web/upload-quota')
                .then(response => response.json())
                .then(quota => {
                    const quotaElement = document.getElementById('uploadQuota');
                    quotaElement.textContent = `${quota.uploads_used}/${quota.uploads_limit}`;

                    // Change color based on usage
                    if (quota.uploads_remaining <= 5) {
                        quotaElement.style.color = '#ef4444';
                    } else if (quota.uploads_remaining <= 15) {
                        quotaElement.style.color = '#fbbf24';
                    } else {
                        quotaElement.style.color = '#a78bfa';
                    }
                })
                .catch(error => {
                    console.error('Failed to load quota:', error);
                });
        }

        function deleteFile(filename) {
            // Show confirmation dialog
            if (!confirm(`Are you sure you want to delete "${filename}"?\n\nThis action cannot be undone.`)) {
                return;
            }

            // Find the row to show loading state
            const row = document.querySelector(`tr[data-filename="${filename}"]`);
            const deleteBtn = row ? row.querySelector('.delete-btn') : null;

            if (deleteBtn) {
                deleteBtn.disabled = true;
                deleteBtn.textContent = '⏳ Deleting...';
            }

            // Delete the file
            fetch(`/web/delete/${encodeURIComponent(filename)}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Show success message briefly
                    if (deleteBtn) {
                        deleteBtn.textContent = '✅ Deleted';
                        deleteBtn.style.background = '#10b981';
                    }

                    // Remove the row with animation
                    setTimeout(() => {
                        if (row) {
                            row.style.transition = 'opacity 0.3s ease';
                            row.style.opacity = '0';
                            setTimeout(() => {
                                // Reload files to update the list
                                loadFiles();
                                loadQuota();
                            }, 300);
                        }
                    }, 500);
                } else {
                    alert(`Failed to delete file: ${data.error || 'Unknown error'}`);
                    if (deleteBtn) {
                        deleteBtn.disabled = false;
                        deleteBtn.textContent = '🗑️ Delete';
                    }
                }
            })
            .catch(error => {
                alert(`Error deleting file: ${error.message}`);
                if (deleteBtn) {
                    deleteBtn.disabled = false;
                    deleteBtn.textContent = '🗑️ Delete';
                }
            });
        }

        function loadFiles() {
            const loadingState = document.getElementById('loadingState');

            fetch('/web/list-files')
                .then(response => response.json())
                .then(files => {
                    allFiles = files;
                    loadingState.style.display = 'none';
                    renderFiles(files);
                    updateStats(files);
                })
                .catch(error => {
                    loadingState.innerHTML = `
                        <div style="color: #fca5a5;">
                            ❌ Failed to load files: ${error.message}
                        </div>
                    `;
                });
        }

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allFiles.filter(file =>
                file.name.toLowerCase().includes(searchTerm)
            );
            renderFiles(filtered);
            updateStats(filtered);
        });

        // Load files and quota on page load
        loadFiles();
        loadQuota();

        // Auto-refresh every 60 seconds
        setInterval(() => {
            loadFiles();
            loadQuota();
        }, 60000);
    </script>
</body>
</html>
