info:
  name: POST /api/v1/get-token
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/get-token"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "auth": {
          "username": "admin",
          "password": "easypassword"
        }
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("bearerToken", res.body.reply.token);

settings:
  encodeUrl: true
