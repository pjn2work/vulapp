info:
  name: POST /api/v1/oauth2/token (authorization_code)
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/api/v1/oauth2/token"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "grant_type": "authorization_code",
        "code": "{{oauthAuthCode}}",
        "client_id": "vulapp-client-001",
        "client_secret": "super-secret-client-secret",
        "redirect_uri": "{{baseUrl}}/web/oauth2/callback"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("oauthToken", res.body.access_token);

settings:
  encodeUrl: true
