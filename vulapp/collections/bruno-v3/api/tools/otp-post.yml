info:
  name: POST /api/tools/otp
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/tools/otp"
  body:
    type: form-urlencoded
    data:
      - name: seed_b32
        value: "{{totpSeed}}"

settings:
  encodeUrl: true

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("otpCode", res.body.otp_code);
